<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WC26 Live Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:     #00d4c8;
    --teal2:    #00b8ad;
    --teal-dim: rgba(0,212,200,0.15);
    --teal-border: rgba(0,212,200,0.3);
    --gold:     #f0c040;
    --live:     #ff3b3b;
    --text:     #ffffff;
    --dim:      rgba(255,255,255,0.45);
    --card:     rgba(255,255,255,0.04);
    --border:   rgba(255,255,255,0.1);
  }

  html, body {
    background: transparent;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    font-size: 14px;
  }

  .banner {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  /* Top teal accent line тАФ matches PK Streamz style */
  .banner::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--teal) 30%, var(--teal) 70%, transparent 100%);
    z-index: 2;
  }

  .inner {
    position: relative; z-index: 1;
    padding: 12px 16px 14px;
  }

  /* тФАтФА Header row: label left, status right тФАтФА */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
  }

  .header-label span {
    color: var(--teal);
  }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pill-live {
    background: rgba(255,59,59,0.15);
    border: 1px solid rgba(255,59,59,0.5);
    color: var(--live);
  }

  .pill-upcoming {
    background: var(--teal-dim);
    border: 1px solid var(--teal-border);
    color: var(--teal);
  }

  .pill-ft {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--dim);
  }

  .pill-ht {
    background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.35);
    color: var(--gold);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live);
    animation: blink 1.1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* тФАтФА Teams row тФАтФА */
  .teams-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .team-flag {
    font-size: 38px;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }

  .team-name {
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.2px;
  }

  .team.winner .team-name { color: var(--teal); }
  .team.winner .team-flag { filter: drop-shadow(0 0 10px rgba(0,212,200,0.5)); }

  /* тФАтФА Center block тФАтФА */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 72px;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 6px;
    line-height: 1;
    color: var(--text);
  }

  .score.is-live { color: var(--live); }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--dim);
  }

  .kick-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--teal);
    line-height: 1;
  }

  .kick-date {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.5px;
    text-align: center;
    margin-top: 2px;
  }

  /* тФАтФА Countdown тФАтФА */
  .countdown {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    margin-bottom: 12px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .cd-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--teal);
    background: var(--teal-dim);
    border: 1px solid var(--teal-border);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 46px;
    text-align: center;
    letter-spacing: 1px;
  }

  .cd-lbl {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--teal-border);
    padding-bottom: 16px;
  }

  /* тФАтФА Goals тФАтФА */
  .goals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 12px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .g-home { text-align: left; }
  .g-away { text-align: right; }

  .g-item {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.6;
  }

  .g-name { color: rgba(255,255,255,0.8); font-weight: 600; }
  .g-min  { color: var(--teal); font-size: 9px; }

  /* тФАтФА Footer: local time + venue тФАтФА */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 9px;
    gap: 8px;
  }

  .venue-text {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .local-time {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .local-time-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--teal);
    line-height: 1;
  }

  .local-time-tz {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* тФАтФА Loading тФАтФА */
  .loading {
    text-align: center;
    padding: 28px 16px;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--teal-border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .team-flag  { font-size: 30px; }
    .score      { font-size: 38px; letter-spacing: 4px; }
    .kick-time  { font-size: 24px; }
    .cd-val     { font-size: 22px; min-width: 38px; }
  }
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="inner">
    <div class="loading">
      <div class="spinner"></div><br>LoadingтАж
    </div>
  </div>
</div>

<script>
// тФАтФА Flag map (ESPN abbreviations + common WC ones) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const F = {
  RSA:'ЁЯЗ┐ЁЯЗж',CAN:'ЁЯЗиЁЯЗж',USA:'ЁЯЗ║ЁЯЗ╕',MEX:'ЁЯЗ▓ЁЯЗ╜',BRA:'ЁЯЗзЁЯЗ╖',ARG:'ЁЯЗжЁЯЗ╖',ENG:'ЁЯП┤ґаБзґаБвґаБеґаБоґаБзґаБ┐',
  FRA:'ЁЯЗлЁЯЗ╖',GER:'ЁЯЗйЁЯЗк',ESP:'ЁЯЗкЁЯЗ╕',POR:'ЁЯЗ╡ЁЯЗ╣',NED:'ЁЯЗ│ЁЯЗ▒',BEL:'ЁЯЗзЁЯЗк',URU:'ЁЯЗ║ЁЯЗ╛',
  COL:'ЁЯЗиЁЯЗ┤',CHI:'ЁЯЗиЁЯЗ▒',ECU:'ЁЯЗкЁЯЗи',PAR:'ЁЯЗ╡ЁЯЗ╛',PER:'ЁЯЗ╡ЁЯЗк',VEN:'ЁЯЗ╗ЁЯЗк',BOL:'ЁЯЗзЁЯЗ┤',
  JAM:'ЁЯЗпЁЯЗ▓',PAN:'ЁЯЗ╡ЁЯЗж',CRC:'ЁЯЗиЁЯЗ╖',HAI:'ЁЯЗнЁЯЗ╣',HND:'ЁЯЗнЁЯЗ│',TRI:'ЁЯЗ╣ЁЯЗ╣',CUW:'ЁЯЗиЁЯЗ╝',
  MAR:'ЁЯЗ▓ЁЯЗж',SEN:'ЁЯЗ╕ЁЯЗ│',GHA:'ЁЯЗмЁЯЗн',CIV:'ЁЯЗиЁЯЗо',EGY:'ЁЯЗкЁЯЗм',ALG:'ЁЯЗйЁЯЗ┐',TUN:'ЁЯЗ╣ЁЯЗ│',
  CMR:'ЁЯЗиЁЯЗ▓',COD:'ЁЯЗиЁЯЗй',RSA2:'ЁЯЗ┐ЁЯЗж',NGA:'ЁЯЗ│ЁЯЗм',MLI:'ЁЯЗ▓ЁЯЗ▒',CPV:'ЁЯЗиЁЯЗ╗',BEN:'ЁЯЗзЁЯЗп',
  JPN:'ЁЯЗпЁЯЗ╡',KOR:'ЁЯЗ░ЁЯЗ╖',IRN:'ЁЯЗоЁЯЗ╖',KSA:'ЁЯЗ╕ЁЯЗж',AUS:'ЁЯЗжЁЯЗ║',NZL:'ЁЯЗ│ЁЯЗ┐',JOR:'ЁЯЗпЁЯЗ┤',
  IRQ:'ЁЯЗоЁЯЗ╢',UZB:'ЁЯЗ║ЁЯЗ┐',QAT:'ЁЯЗ╢ЁЯЗж',UAE:'ЁЯЗжЁЯЗк',CHN:'ЁЯЗиЁЯЗ│',IND:'ЁЯЗоЁЯЗ│',THA:'ЁЯЗ╣ЁЯЗн',
  SCO:'ЁЯП┤ґаБзґаБвґаБ│ґаБгґаБ┤ґаБ┐',WAL:'ЁЯП┤ґаБзґаБвґаБ╖ґаБмґаБ│ґаБ┐',IRL:'ЁЯЗоЁЯЗк',CZE:'ЁЯЗиЁЯЗ┐',HUN:'ЁЯЗнЁЯЗ║',AUT:'ЁЯЗжЁЯЗ╣',
  SUI:'ЁЯЗиЁЯЗн',POL:'ЁЯЗ╡ЁЯЗ▒',CRO:'ЁЯЗнЁЯЗ╖',SRB:'ЁЯЗ╖ЁЯЗ╕',SVK:'ЁЯЗ╕ЁЯЗ░',SLO:'ЁЯЗ╕ЁЯЗо',BIH:'ЁЯЗзЁЯЗж',
  MNE:'ЁЯЗ▓ЁЯЗк',NOR:'ЁЯЗ│ЁЯЗ┤',SWE:'ЁЯЗ╕ЁЯЗк',DEN:'ЁЯЗйЁЯЗ░',FIN:'ЁЯЗлЁЯЗо',GRE:'ЁЯЗмЁЯЗ╖',TUR:'ЁЯЗ╣ЁЯЗ╖',
  BLR:'ЁЯЗзЁЯЗ╛',UKR:'ЁЯЗ║ЁЯЗж',ROU:'ЁЯЗ╖ЁЯЗ┤',BUL:'ЁЯЗзЁЯЗм',ISL:'ЁЯЗоЁЯЗ╕',ALB:'ЁЯЗжЁЯЗ▒',KAZ:'ЁЯЗ░ЁЯЗ┐',
};
const flag = a => F[a] || F[(a||'').toUpperCase()] || 'ЁЯП│';

// тФАтФА Timezone label тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function tzAbbr() {
  try {
    return new Date().toLocaleTimeString('en-GB',{timeZoneName:'short'}).split(' ').pop() || 'LOCAL';
  } catch { return 'LOCAL'; }
}

// тФАтФА Clock тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function startClock() {
  const el = document.getElementById('clk');
  if (!el) return;
  const tick = () => {
    if (!document.getElementById('clk')) return;
    document.getElementById('clk').textContent =
      new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  };
  tick(); setInterval(tick, 1000);
}

// тФАтФА Countdown тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let cdTick = null;
function startCountdown(kickoff) {
  if (cdTick) clearInterval(cdTick);
  const update = () => {
    const diff = kickoff - Date.now();
    if (diff <= 0) { clearInterval(cdTick); fetchAndRender(); return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=String(v).padStart(2,'0'); };
    const dw = document.getElementById('cd-dw');
    if (dw) dw.style.display = d > 0 ? '' : 'none';
    set('cd-d',d); set('cd-h',h); set('cd-m',m); set('cd-s',s);
  };
  update(); cdTick = setInterval(update, 1000);
}

// тФАтФА Goal extraction тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function goals(comp) {
  return (comp.details||[]).reduce((acc,d) => {
    const t = d.type?.text||'';
    if (!/goal/i.test(t)) return acc;
    const ath = d.athletesInvolved?.[0];
    if (!ath) return acc;
    acc.push({
      name:    ath.displayName||'',
      min:     d.clock?.displayValue||'',
      teamId:  d.team?.id || ath.team?.id || '',
      pen:     /penalty/i.test(t),
      og:      /own.?goal/i.test(t),
    });
    return acc;
  }, []);
}

// тФАтФА Pick best match тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function pick(events) {
  const now      = Date.now();
  const todayStr = new Date().toDateString();
  const sameDay  = e => new Date(e.date).toDateString() === todayStr;

  // 1. Live or half-time тАФ always wins, no exceptions
  const live = events.filter(e => {
    const n = e.status?.type?.name;
    return n === 'STATUS_IN_PROGRESS' || n === 'STATUS_HALFTIME';
  });
  if (live.length) {
    const ht = live[0].status.type.name === 'STATUS_HALFTIME';
    return { ev: live[0], state: ht ? 'ht' : 'live' };
  }

  // 2. Most recently finished match TODAY тАФ keep showing the result
  const ftToday = events
    .filter(e => e.status?.type?.completed && sameDay(e))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  if (ftToday.length) return { ev: ftToday[0], state: 'ft' };

  // 3. Next upcoming тАФ only if nothing live or finished today
  const upcoming = events
    .filter(e => e.status?.type?.name === 'STATUS_SCHEDULED' && new Date(e.date) > now)
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  if (upcoming.length) return { ev: upcoming[0], state: 'upcoming' };

  // 4. Fallback: most recent finished ever
  const ftAny = events
    .filter(e => e.status?.type?.completed)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  if (ftAny.length) return { ev: ftAny[0], state: 'ft' };

  return null;
}

// тФАтФА HTML escape тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// тФАтФА Render тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let isLive = false;
let refreshTimer = null;

function render(picked) {
  const banner = document.getElementById('banner');

  if (!picked) {
    banner.innerHTML = `<div class="inner"><div class="loading">No fixtures right now</div></div>`;
    return;
  }

  const {ev, state} = picked;
  const comp   = ev.competitions?.[0];
  const home   = comp?.competitors?.find(c=>c.homeAway==='home');
  const away   = comp?.competitors?.find(c=>c.homeAway==='away');
  if (!home||!away) return;

  const ha = home.team?.abbreviation||'???';
  const aa = away.team?.abbreviation||'???';
  const hn = home.team?.displayName||ha;
  const an = away.team?.displayName||aa;
  const hs = home.score!==undefined&&home.score!=='' ? parseInt(home.score) : null;
  const as_ = away.score!==undefined&&away.score!=='' ? parseInt(away.score) : null;
  const hasScore = hs!==null && as_!==null;

  const gs    = goals(comp||{});
  const hg    = gs.filter(g=>g.teamId===home.team?.id);
  const ag    = gs.filter(g=>g.teamId===away.team?.id);
  const kick  = new Date(ev.date);
  const venue = comp?.venue?.fullName||'';
  const city  = [comp?.venue?.address?.city, comp?.venue?.address?.state||comp?.venue?.address?.country].filter(Boolean).join(', ');
  const note  = comp?.notes?.find(n=>n.type==='event')?.headline||'';
  const clock = ev.status?.displayClock||'';

  isLive = state==='live'||state==='ht';

  // Status pill
  const pill = state==='live' ? `<div class="status-pill pill-live"><span class="live-dot"></span>LIVE ${esc(clock)}</div>`
             : state==='ht'   ? `<div class="status-pill pill-ht">тП╕ HALF TIME</div>`
             : state==='ft'   ? `<div class="status-pill pill-ft">FULL TIME</div>`
             :                  `<div class="status-pill pill-upcoming">тЪ╜ UPCOMING</div>`;

  // Header label
  const headerLabel = note
    ? `WORLD CUP 26 ┬╖ <span>${esc(note.toUpperCase())}</span>`
    : `<span>FIFA</span> WORLD CUP 26`;

  // Center
  let center = '';
  if (state==='upcoming') {
    const t = kick.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const d = kick.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    center = `<div class="kick-time">${esc(t)}</div><div class="kick-date">${esc(d)} ┬╖ ${esc(tzAbbr())}</div>`;
  } else if (hasScore) {
    center = `<div class="score${state==='live'?' is-live':''}">${hs} тАУ ${as_}</div>`;
  } else {
    center = `<div class="vs">VS</div>`;
  }

  // Countdown
  const cd = state==='upcoming' ? `
    <div class="countdown">
      <div class="cd-unit" id="cd-dw">
        <div class="cd-val" id="cd-d">00</div>
        <div class="cd-lbl">Days</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-h">00</div>
        <div class="cd-lbl">Hrs</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-m">00</div>
        <div class="cd-lbl">Min</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-s">00</div>
        <div class="cd-lbl">Sec</div>
      </div>
    </div>` : '';

  // Goals strip
  let goalsHTML = '';
  if (gs.length > 0) {
    const renderGoal = (g, side) => {
      const lbl = g.og?`${g.name} (OG)`:g.pen?`${g.name} (P)`:g.name;
      return side==='home'
        ? `<div class="g-item g-home"><span class="g-name">${esc(lbl)}</span> <span class="g-min">${esc(g.min)}</span></div>`
        : `<div class="g-item g-away"><span class="g-min">${esc(g.min)}</span> <span class="g-name">${esc(lbl)}</span></div>`;
    };
    // Pair home+away per row
    const maxRows = Math.max(hg.length, ag.length);
    let rows = '';
    for (let i = 0; i < Math.min(maxRows, 3); i++) {
      rows += hg[i] ? renderGoal(hg[i],'home') : '<div class="g-item g-home"></div>';
      rows += ag[i] ? renderGoal(ag[i],'away') : '<div class="g-item g-away"></div>';
    }
    goalsHTML = `<div class="goals">${rows}</div>`;
  }

  // Venue
  const venueStr = [venue, city].filter(Boolean).join(' ┬╖ ');

  // Winner classes
  const hwc = (home.winner&&state==='ft') ? ' winner':'';
  const awc = (away.winner&&state==='ft') ? ' winner':'';

  banner.innerHTML = `
    <div class="inner">
      <div class="header-row">
        <div class="header-label">${headerLabel}</div>
        ${pill}
      </div>

      <div class="teams-row">
        <div class="team${hwc}">
          <div class="team-flag">${flag(ha)}</div>
          <div class="team-name">${esc(hn)}</div>
        </div>
        <div class="center">${center}</div>
        <div class="team${awc}">
          <div class="team-flag">${flag(aa)}</div>
          <div class="team-name">${esc(an)}</div>
        </div>
      </div>

      ${cd}
      ${goalsHTML}

      <div class="footer-row">
        <div class="venue-text">${venueStr ? 'ЁЯУН '+esc(venueStr) : ''}</div>
        <div class="local-time">
          <div class="local-time-val" id="clk">--:--:--</div>
          <div class="local-time-tz">${esc(tzAbbr())}</div>
        </div>
      </div>
    </div>
  `;

  startClock();
  if (state==='upcoming') startCountdown(kick);
}

// тФАтФА Fetch тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function fetchAndRender() {
  try {
    const now = new Date();
    const dates = [-1,0,1].map(o => {
      const d = new Date(now); d.setDate(d.getDate()+o);
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    });

    const results = await Promise.allSettled(
      dates.map(dt =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dt}&limit=20`)
          .then(r => r.ok ? r.json() : {events:[]})
          .catch(() => ({events:[]}))
      )
    );

    const seen = new Set();
    const all = [];
    for (const r of results) {
      if (r.status==='fulfilled') {
        for (const ev of (r.value.events||[])) {
          if (!seen.has(ev.id)) { seen.add(ev.id); all.push(ev); }
        }
      }
    }

    render(pick(all));
  } catch(e) {
    document.getElementById('banner').innerHTML =
      `<div class="inner"><div class="loading">тЪа Could not load match data</div></div>`;
    console.error(e);
  }

  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAndRender, isLive ? 30000 : 60000);
}

fetchAndRender();
</script>
