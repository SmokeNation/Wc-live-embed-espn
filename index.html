<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WC26 Live Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:     #00d4c8;
    --teal2:    #00b8ad;
    --teal-dim: rgba(0,212,200,0.15);
    --teal-border: rgba(0,212,200,0.3);
    --gold:     #f0c040;
    --live:     #ff3b3b;
    --text:     #ffffff;
    --dim:      rgba(255,255,255,0.45);
    --card:     rgba(255,255,255,0.04);
    --border:   rgba(255,255,255,0.1);
  }

  html, body {
    background: transparent;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    font-size: 14px;
  }

  .banner {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  /* Top teal accent line вАФ matches PK Streamz style */
  .banner::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--teal) 30%, var(--teal) 70%, transparent 100%);
    z-index: 2;
  }

  .inner {
    position: relative; z-index: 1;
    padding: 12px 16px 14px;
  }

  /* вФАвФА Header row: label left, status right вФАвФА */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
  }

  .header-label span {
    color: var(--teal);
  }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pill-live {
    background: rgba(255,59,59,0.15);
    border: 1px solid rgba(255,59,59,0.5);
    color: var(--live);
  }

  .pill-upcoming {
    background: var(--teal-dim);
    border: 1px solid var(--teal-border);
    color: var(--teal);
  }

  .pill-ft {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--dim);
  }

  .pill-ht {
    background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.35);
    color: var(--gold);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live);
    animation: blink 1.1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* вФАвФА Teams row вФАвФА */
  .teams-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .team-flag {
    font-size: 38px;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }

  .team-name {
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.2px;
  }

  .team.winner .team-name { color: var(--teal); }
  .team.winner .team-flag { filter: drop-shadow(0 0 10px rgba(0,212,200,0.5)); }

  /* вФАвФА Center block вФАвФА */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 72px;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 6px;
    line-height: 1;
    color: var(--text);
  }

  .score.is-live { color: var(--live); }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--dim);
  }

  .kick-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--teal);
    line-height: 1;
  }

  .kick-date {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.5px;
    text-align: center;
    margin-top: 2px;
  }

  /* вФАвФА Countdown вФАвФА */
  .countdown {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    margin-bottom: 12px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .cd-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--teal);
    background: var(--teal-dim);
    border: 1px solid var(--teal-border);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 46px;
    text-align: center;
    letter-spacing: 1px;
  }

  .cd-lbl {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--teal-border);
    padding-bottom: 16px;
  }

  /* вФАвФА Goals вФАвФА */
  .goals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 12px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .g-home { text-align: left; }
  .g-away { text-align: right; }

  .g-item {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.6;
  }

  .g-name { color: rgba(255,255,255,0.8); font-weight: 600; }
  .g-min  { color: var(--teal); font-size: 9px; }

  /* вФАвФА Footer: local time + venue вФАвФА */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 9px;
    gap: 8px;
  }

  .venue-text {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .local-time {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .local-time-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--teal);
    line-height: 1;
  }

  .local-time-tz {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* вФАвФА Loading вФАвФА */
  .loading {
    text-align: center;
    padding: 28px 16px;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--teal-border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .team-flag  { font-size: 30px; }
    .score      { font-size: 38px; letter-spacing: 4px; }
    .kick-time  { font-size: 24px; }
    .cd-val     { font-size: 22px; min-width: 38px; }
  }
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="inner">
    <div class="loading">
      <div class="spinner"></div><br>LoadingвА¶
    </div>
  </div>
</div>

<script>
// вФАвФА Flag map (ESPN abbreviations + common WC ones) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const F = {
  RSA:'рЯЗњрЯЗ¶',CAN:'рЯЗ®рЯЗ¶',USA:'рЯЗЇрЯЗЄ',MEX:'рЯЗ≤рЯЗљ',BRA:'рЯЗІрЯЗЈ',ARG:'рЯЗ¶рЯЗЈ',ENG:'рЯПіу†БІу†БҐу†Б•у†БЃу†БІу†Бњ',
  FRA:'рЯЗЂрЯЗЈ',GER:'рЯЗ©рЯЗ™',ESP:'рЯЗ™рЯЗЄ',POR:'рЯЗµрЯЗє',NED:'рЯЗ≥рЯЗ±',BEL:'рЯЗІрЯЗ™',URU:'рЯЗЇрЯЗЊ',
  COL:'рЯЗ®рЯЗі',CHI:'рЯЗ®рЯЗ±',ECU:'рЯЗ™рЯЗ®',PAR:'рЯЗµрЯЗЊ',PER:'рЯЗµрЯЗ™',VEN:'рЯЗїрЯЗ™',BOL:'рЯЗІрЯЗі',
  JAM:'рЯЗѓрЯЗ≤',PAN:'рЯЗµрЯЗ¶',CRC:'рЯЗ®рЯЗЈ',HAI:'рЯЗ≠рЯЗє',HND:'рЯЗ≠рЯЗ≥',TRI:'рЯЗєрЯЗє',CUW:'рЯЗ®рЯЗЉ',
  MAR:'рЯЗ≤рЯЗ¶',SEN:'рЯЗЄрЯЗ≥',GHA:'рЯЗђрЯЗ≠',CIV:'рЯЗ®рЯЗЃ',EGY:'рЯЗ™рЯЗђ',ALG:'рЯЗ©рЯЗњ',TUN:'рЯЗєрЯЗ≥',
  CMR:'рЯЗ®рЯЗ≤',COD:'рЯЗ®рЯЗ©',RSA2:'рЯЗњрЯЗ¶',NGA:'рЯЗ≥рЯЗђ',MLI:'рЯЗ≤рЯЗ±',CPV:'рЯЗ®рЯЗї',BEN:'рЯЗІрЯЗѓ',
  JPN:'рЯЗѓрЯЗµ',KOR:'рЯЗ∞рЯЗЈ',IRN:'рЯЗЃрЯЗЈ',KSA:'рЯЗЄрЯЗ¶',AUS:'рЯЗ¶рЯЗЇ',NZL:'рЯЗ≥рЯЗњ',JOR:'рЯЗѓрЯЗі',
  IRQ:'рЯЗЃрЯЗґ',UZB:'рЯЗЇрЯЗњ',QAT:'рЯЗґрЯЗ¶',UAE:'рЯЗ¶рЯЗ™',CHN:'рЯЗ®рЯЗ≥',IND:'рЯЗЃрЯЗ≥',THA:'рЯЗєрЯЗ≠',
  SCO:'рЯПіу†БІу†БҐу†Б≥у†Б£у†Біу†Бњ',WAL:'рЯПіу†БІу†БҐу†БЈу†Бђу†Б≥у†Бњ',IRL:'рЯЗЃрЯЗ™',CZE:'рЯЗ®рЯЗњ',HUN:'рЯЗ≠рЯЗЇ',AUT:'рЯЗ¶рЯЗє',
  SUI:'рЯЗ®рЯЗ≠',POL:'рЯЗµрЯЗ±',CRO:'рЯЗ≠рЯЗЈ',SRB:'рЯЗЈрЯЗЄ',SVK:'рЯЗЄрЯЗ∞',SLO:'рЯЗЄрЯЗЃ',BIH:'рЯЗІрЯЗ¶',
  MNE:'рЯЗ≤рЯЗ™',NOR:'рЯЗ≥рЯЗі',SWE:'рЯЗЄрЯЗ™',DEN:'рЯЗ©рЯЗ∞',FIN:'рЯЗЂрЯЗЃ',GRE:'рЯЗђрЯЗЈ',TUR:'рЯЗєрЯЗЈ',
  BLR:'рЯЗІрЯЗЊ',UKR:'рЯЗЇрЯЗ¶',ROU:'рЯЗЈрЯЗі',BUL:'рЯЗІрЯЗђ',ISL:'рЯЗЃрЯЗЄ',ALB:'рЯЗ¶рЯЗ±',KAZ:'рЯЗ∞рЯЗњ',
};
const flag = a => F[a] || F[(a||'').toUpperCase()] || 'рЯП≥';

// вФАвФА Timezone label вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function tzAbbr() {
  try {
    return new Date().toLocaleTimeString('en-GB',{timeZoneName:'short'}).split(' ').pop() || 'LOCAL';
  } catch { return 'LOCAL'; }
}

// вФАвФА Clock вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function startClock() {
  const el = document.getElementById('clk');
  if (!el) return;
  const tick = () => {
    if (!document.getElementById('clk')) return;
    document.getElementById('clk').textContent =
      new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  };
  tick(); setInterval(tick, 1000);
}

// вФАвФА Countdown вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
let cdTick = null;
function startCountdown(kickoff) {
  if (cdTick) clearInterval(cdTick);
  const update = () => {
    const diff = kickoff - Date.now();
    if (diff <= 0) { clearInterval(cdTick); fetchAndRender(); return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=String(v).padStart(2,'0'); };
    const dw = document.getElementById('cd-dw');
    if (dw) dw.style.display = d > 0 ? '' : 'none';
    set('cd-d',d); set('cd-h',h); set('cd-m',m); set('cd-s',s);
  };
  update(); cdTick = setInterval(update, 1000);
}

// вФАвФА Goal extraction вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function goals(comp) {
  return (comp.details||[]).reduce((acc,d) => {
    const t = d.type?.text||'';
    if (!/goal/i.test(t)) return acc;
    const ath = d.athletesInvolved?.[0];
    if (!ath) return acc;
    acc.push({
      name:    ath.displayName||'',
      min:     d.clock?.displayValue||'',
      teamId:  d.team?.id || ath.team?.id || '',
      pen:     /penalty/i.test(t),
      og:      /own.?goal/i.test(t),
    });
    return acc;
  }, []);
}

// вФАвФА Pick best match вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function pick(events) {
  const now = Date.now();
  const byStatus = n => events.filter(e=>e.status?.type?.name===n);

  const live = events.filter(e=>{
    const n=e.status?.type?.name;
    return n==='STATUS_IN_PROGRESS'||n==='STATUS_HALFTIME';
  });
  if (live.length) return { ev:live[0], state: live[0].status.type.name==='STATUS_HALFTIME'?'ht':'live' };

  const up = events
    .filter(e=>e.status?.type?.name==='STATUS_SCHEDULED'&&new Date(e.date)>now)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (up.length) return { ev:up[0], state:'upcoming' };

  const ft = events
    .filter(e=>e.status?.type?.completed)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (ft.length) return { ev:ft[0], state:'ft' };

  return null;
}

// вФАвФА HTML escape вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// вФАвФА Render вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
let isLive = false;
let refreshTimer = null;

function render(picked) {
  const banner = document.getElementById('banner');

  if (!picked) {
    banner.innerHTML = `<div class="inner"><div class="loading">No fixtures right now</div></div>`;
    return;
  }

  const {ev, state} = picked;
  const comp   = ev.competitions?.[0];
  const home   = comp?.competitors?.find(c=>c.homeAway==='home');
  const away   = comp?.competitors?.find(c=>c.homeAway==='away');
  if (!home||!away) return;

  const ha = home.team?.abbreviation||'???';
  const aa = away.team?.abbreviation||'???';
  const hn = home.team?.displayName||ha;
  const an = away.team?.displayName||aa;
  const hs = home.score!==undefined&&home.score!=='' ? parseInt(home.score) : null;
  const as_ = away.score!==undefined&&away.score!=='' ? parseInt(away.score) : null;
  const hasScore = hs!==null && as_!==null;

  const gs    = goals(comp||{});
  const hg    = gs.filter(g=>g.teamId===home.team?.id);
  const ag    = gs.filter(g=>g.teamId===away.team?.id);
  const kick  = new Date(ev.date);
  const venue = comp?.venue?.fullName||'';
  const city  = [comp?.venue?.address?.city, comp?.venue?.address?.state||comp?.venue?.address?.country].filter(Boolean).join(', ');
  const note  = comp?.notes?.find(n=>n.type==='event')?.headline||'';
  const clock = ev.status?.displayClock||'';

  isLive = state==='live'||state==='ht';

  // Status pill
  const pill = state==='live' ? `<div class="status-pill pill-live"><span class="live-dot"></span>LIVE ${esc(clock)}</div>`
             : state==='ht'   ? `<div class="status-pill pill-ht">вПЄ HALF TIME</div>`
             : state==='ft'   ? `<div class="status-pill pill-ft">FULL TIME</div>`
             :                  `<div class="status-pill pill-upcoming">вЪљ UPCOMING</div>`;

  // Header label
  const headerLabel = note
    ? `WORLD CUP 26 ¬Ј <span>${esc(note.toUpperCase())}</span>`
    : `<span>FIFA</span> WORLD CUP 26`;

  // Center
  let center = '';
  if (state==='upcoming') {
    const t = kick.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const d = kick.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    center = `<div class="kick-time">${esc(t)}</div><div class="kick-date">${esc(d)} ¬Ј ${esc(tzAbbr())}</div>`;
  } else if (hasScore) {
    center = `<div class="score${state==='live'?' is-live':''}">${hs} вАУ ${as_}</div>`;
  } else {
    center = `<div class="vs">VS</div>`;
  }

  // Countdown
  const cd = state==='upcoming' ? `
    <div class="countdown">
      <div class="cd-unit" id="cd-dw">
        <div class="cd-val" id="cd-d">00</div>
        <div class="cd-lbl">Days</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-h">00</div>
        <div class="cd-lbl">Hrs</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-m">00</div>
        <div class="cd-lbl">Min</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-val" id="cd-s">00</div>
        <div class="cd-lbl">Sec</div>
      </div>
    </div>` : '';

  // Goals strip
  let goalsHTML = '';
  if (gs.length > 0) {
    const renderGoal = (g, side) => {
      const lbl = g.og?`${g.name} (OG)`:g.pen?`${g.name} (P)`:g.name;
      return side==='home'
        ? `<div class="g-item g-home"><span class="g-name">${esc(lbl)}</span> <span class="g-min">${esc(g.min)}</span></div>`
        : `<div class="g-item g-away"><span class="g-min">${esc(g.min)}</span> <span class="g-name">${esc(lbl)}</span></div>`;
    };
    // Pair home+away per row
    const maxRows = Math.max(hg.length, ag.length);
    let rows = '';
    for (let i = 0; i < Math.min(maxRows, 3); i++) {
      rows += hg[i] ? renderGoal(hg[i],'home') : '<div class="g-item g-home"></div>';
      rows += ag[i] ? renderGoal(ag[i],'away') : '<div class="g-item g-away"></div>';
    }
    goalsHTML = `<div class="goals">${rows}</div>`;
  }

  // Venue
  const venueStr = [venue, city].filter(Boolean).join(' ¬Ј ');

  // Winner classes
  const hwc = (home.winner&&state==='ft') ? ' winner':'';
  const awc = (away.winner&&state==='ft') ? ' winner':'';

  banner.innerHTML = `
    <div class="inner">
      <div class="header-row">
        <div class="header-label">${headerLabel}</div>
        ${pill}
      </div>

      <div class="teams-row">
        <div class="team${hwc}">
          <div class="team-flag">${flag(ha)}</div>
          <div class="team-name">${esc(hn)}</div>
        </div>
        <div class="center">${center}</div>
        <div class="team${awc}">
          <div class="team-flag">${flag(aa)}</div>
          <div class="team-name">${esc(an)}</div>
        </div>
      </div>

      ${cd}
      ${goalsHTML}

      <div class="footer-row">
        <div class="venue-text">${venueStr ? 'рЯУН '+esc(venueStr) : ''}</div>
        <div class="local-time">
          <div class="local-time-val" id="clk">--:--:--</div>
          <div class="local-time-tz">${esc(tzAbbr())}</div>
        </div>
      </div>
    </div>
  `;

  startClock();
  if (state==='upcoming') startCountdown(kick);
}

// вФАвФА Fetch вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
async function fetchAndRender() {
  try {
    const now = new Date();
    const dates = [-1,0,1].map(o => {
      const d = new Date(now); d.setDate(d.getDate()+o);
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    });

    const results = await Promise.allSettled(
      dates.map(dt =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dt}&limit=20`)
          .then(r => r.ok ? r.json() : {events:[]})
          .catch(() => ({events:[]}))
      )
    );

    const seen = new Set();
    const all = [];
    for (const r of results) {
      if (r.status==='fulfilled') {
        for (const ev of (r.value.events||[])) {
          if (!seen.has(ev.id)) { seen.add(ev.id); all.push(ev); }
        }
      }
    }

    render(pick(all));
  } catch(e) {
    document.getElementById('banner').innerHTML =
      `<div class="inner"><div class="loading">вЪ† Could not load match data</div></div>`;
    console.error(e);
  }

  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAndRender, isLive ? 30000 : 60000);
}

fetchAndRender();
</script>
</body>
</html>
