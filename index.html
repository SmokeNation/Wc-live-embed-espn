<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WC26 Live Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #c9a84c;
    --gold2:   #f0d080;
    --green:   #00a86b;
    --red:     #e8192c;
    --dark:    #050e1a;
    --card:    #0b1929;
    --border:  rgba(201,168,76,0.25);
    --dim:     rgba(255,255,255,0.45);
    --text:    #f0ede8;
    --live:    #ff3b3b;
  }

  html, body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    font-size: 14px;
  }

  /* ── Outer banner ── */
  .banner {
    width: 100%;
    background: linear-gradient(135deg, #050e1a 0%, #0b1f35 50%, #050e1a 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    user-select: none;
  }

  /* Pitch-line texture overlay */
  .banner::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 48px,
        rgba(255,255,255,0.018) 48px,
        rgba(255,255,255,0.018) 49px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Gold top accent bar */
  .banner::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
    z-index: 2;
  }

  .inner {
    position: relative; z-index: 1;
    padding: 10px 16px 12px;
  }

  /* ── Top strip: tournament label + local time ── */
  .top-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .tournament-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wc-badge {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .tournament-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    color: var(--gold);
    line-height: 1;
  }

  .tournament-sub {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .local-time {
    text-align: right;
  }

  .local-time-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }

  .local-time-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    text-align: right;
  }

  /* ── Status pill ── */
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .status-pill.live {
    background: rgba(255,59,59,0.15);
    border: 1px solid rgba(255,59,59,0.4);
    color: var(--live);
  }

  .status-pill.upcoming {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold);
  }

  .status-pill.ft {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--dim);
  }

  .status-pill.ht {
    background: rgba(0,168,107,0.12);
    border: 1px solid rgba(0,168,107,0.4);
    color: var(--green);
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── Match row ── */
  .match-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .team-flag {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .team-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .team-name {
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 0.3px;
    max-width: 90px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team.winner .team-code { color: var(--gold); }
  .team.winner .team-flag { filter: drop-shadow(0 2px 10px rgba(201,168,76,0.5)); }

  /* ── Score / countdown center ── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 80px;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }

  .score.live-score { color: var(--live); }

  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--dim);
    letter-spacing: 3px;
  }

  .kick-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }

  .kick-date {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Countdown timer ── */
  .countdown {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 10px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cd-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 44px;
    text-align: center;
    letter-spacing: 1px;
  }

  .cd-label {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--dim);
    padding-bottom: 14px;
  }

  /* ── Goals strip ── */
  .goals-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 8px;
    margin-bottom: 8px;
    min-height: 0;
  }

  .goal-item {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .goal-item.home { text-align: left; }
  .goal-item.away { text-align: right; }

  .goal-item .goal-name { color: var(--text); font-weight: 600; }
  .goal-item .goal-min  { color: var(--gold); font-size: 9px; margin-left: 3px; }

  /* ── Bottom strip: venue + round ── */
  .bottom-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 8px;
  }

  .venue-info {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .venue-info .venue-icon { margin-right: 4px; }

  .round-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Loading / error ── */
  .loading {
    text-align: center;
    padding: 24px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .loading-spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .team-flag  { font-size: 26px; }
    .score      { font-size: 36px; }
    .kick-time  { font-size: 22px; }
    .cd-value   { font-size: 20px; min-width: 36px; padding: 2px 5px; }
    .tournament-name { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="inner">
    <div class="loading">
      <div class="loading-spinner"></div><br>Loading match data…
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
// Change this to your own Vercel deployment URL
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? ''
  : 'https://wc26-widget.vercel.app';

// Refresh every 30s when live, 60s otherwise
let refreshTimer = null;
let isLiveNow = false;

// ── Country code → flag emoji ─────────────────────────────────────────────
const FLAGS = {
  AFG:'🇦🇫',ALB:'🇦🇱',ALG:'🇩🇿',AND:'🇦🇩',ANG:'🇦🇴',ARG:'🇦🇷',ARM:'🇦🇲',
  AUS:'🇦🇺',AUT:'🇦🇹',AZE:'🇦🇿',BEL:'🇧🇪',BEN:'🇧🇯',BER:'🇧🇲',BIH:'🇧🇦',
  BLR:'🇧🇾',BOL:'🇧🇴',BRA:'🇧🇷',BUL:'🇧🇬',BUR:'🇧🇫',CAN:'🇨🇦',CAP:'🇨🇻',
  CHI:'🇨🇱',CIV:'🇨🇮',CMR:'🇨🇲',COD:'🇨🇩',COL:'🇨🇴',CPV:'🇨🇻',CRC:'🇨🇷',
  CRO:'🇭🇷',CUW:'🇨🇼',CZE:'🇨🇿',DEN:'🇩🇰',ECU:'🇪🇨',EGY:'🇪🇬',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  ESP:'🇪🇸',ETH:'🇪🇹',FIN:'🇫🇮',FRA:'🇫🇷',GAB:'🇬🇦',GER:'🇩🇪',GHA:'🇬🇭',
  GRE:'🇬🇷',GUA:'🇬🇹',HAI:'🇭🇹',HND:'🇭🇳',HUN:'🇭🇺',IND:'🇮🇳',IRN:'🇮🇷',
  IRQ:'🇮🇶',IRL:'🇮🇪',ISL:'🇮🇸',ISR:'🇮🇱',ITA:'🇮🇹',JAM:'🇯🇲',JPN:'🇯🇵',
  JOR:'🇯🇴',KAZ:'🇰🇿',KEN:'🇰🇪',KOR:'🇰🇷',KSA:'🇸🇦',KUW:'🇰🇼',LIB:'🇱🇧',
  MAR:'🇲🇦',MEX:'🇲🇽',MLD:'🇲🇻',MLI:'🇲🇱',MNE:'🇲🇪',MOZ:'🇲🇿',MRT:'🇲🇷',
  NED:'🇳🇱',NGA:'🇳🇬',NOR:'🇳🇴',NZL:'🇳🇿',OMA:'🇴🇲',PAN:'🇵🇦',PAR:'🇵🇾',
  PER:'🇵🇪',PHI:'🇵🇭',POL:'🇵🇱',POR:'🇵🇹',PRK:'🇰🇵',QAT:'🇶🇦',ROU:'🇷🇴',
  RSA:'🇿🇦',RUS:'🇷🇺',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',SEN:'🇸🇳',SLO:'🇸🇮',SRB:'🇷🇸',SUI:'🇨🇭',
  SVK:'🇸🇰',SWE:'🇸🇪',SYR:'🇸🇾',TAN:'🇹🇿',THA:'🇹🇭',TRI:'🇹🇹',TUN:'🇹🇳',
  TUR:'🇹🇷',UAE:'🇦🇪',UGA:'🇺🇬',UKR:'🇺🇦',URU:'🇺🇾',USA:'🇺🇸',UZB:'🇺🇿',
  VEN:'🇻🇪',VIE:'🇻🇳',WAL:'🏴󠁧󠁢󠁷󠁬󠁳󠁿',ZAM:'🇿🇲',ZIM:'🇿🇼',
  // ESPN abbreviations
  ARG2:'🇦🇷',BRA2:'🇧🇷',ENG2:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',FRA2:'🇫🇷',GER2:'🇩🇪',
};

function getFlag(abbr) {
  return FLAGS[abbr] || FLAGS[abbr?.toUpperCase()] || '🏳';
}

// ── Local time tick ───────────────────────────────────────────────────────
function startClock() {
  function tick() {
    const el = document.getElementById('local-time-val');
    if (!el) return;
    const now = new Date();
    el.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  tick();
  setInterval(tick, 1000);
}

// ── Countdown to kickoff ──────────────────────────────────────────────────
let cdInterval = null;

function startCountdown(kickoffDate) {
  if (cdInterval) clearInterval(cdInterval);

  function update() {
    const diff = kickoffDate - Date.now();
    if (diff <= 0) { clearInterval(cdInterval); fetchAndRender(); return; }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    const set = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.textContent = String(val).padStart(2, '0');
    };

    // Show days unit only if > 0
    const dEl = document.getElementById('cd-days-wrap');
    if (dEl) dEl.style.display = d > 0 ? 'flex' : 'none';
    set('cd-d', d);
    set('cd-h', h);
    set('cd-m', m);
    set('cd-s', s);
  }

  update();
  cdInterval = setInterval(update, 1000);
}

// ── Fetch from ESPN /espn endpoint ────────────────────────────────────────
async function fetchData(panel, params = {}) {
  const qs = new URLSearchParams({ panel, ...params }).toString();
  // We parse the ESPN JSON directly — call a thin JSON proxy if needed,
  // but for the banner we hit ESPN directly since it's client-side JS
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=20`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('ESPN fetch failed');
  return res.json();
}

// ── Pick the best match to show ───────────────────────────────────────────
function pickMatch(events) {
  const now = Date.now();

  // 1. Live (in-progress)
  const live = events.filter(e => {
    const t = e.status?.type?.name;
    return t === 'STATUS_IN_PROGRESS' || t === 'STATUS_HALFTIME';
  });
  if (live.length) return { ev: live[0], state: live[0].status?.type?.name === 'STATUS_HALFTIME' ? 'ht' : 'live' };

  // 2. Soonest upcoming
  const upcoming = events
    .filter(e => e.status?.type?.name === 'STATUS_SCHEDULED' && new Date(e.date) > now)
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  if (upcoming.length) return { ev: upcoming[0], state: 'upcoming' };

  // 3. Most recent finished
  const done = events
    .filter(e => e.status?.type?.completed)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  if (done.length) return { ev: done[0], state: 'ft' };

  return null;
}

// ── Extract goals from ESPN event details ─────────────────────────────────
function extractGoals(competition) {
  const details = competition.details || [];
  const goals = [];
  for (const d of details) {
    const type = d.type?.text || '';
    if (!/goal/i.test(type)) continue;
    const athlete = d.athletesInvolved?.[0];
    if (!athlete) continue;
    goals.push({
      name:    athlete.displayName || '',
      minute:  d.clock?.displayValue || '',
      teamId:  d.team?.id || athlete.team?.id || '',
      penalty: /penalty/i.test(type),
      ownGoal: /own.?goal/i.test(type),
    });
  }
  return goals;
}

// ── Get user's local timezone label ──────────────────────────────────────
function tzLabel() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    // Short label e.g. "BST", "EDT"
    const abbr = new Date().toLocaleTimeString('en', { timeZoneName: 'short' }).split(' ').pop();
    return abbr || tz;
  } catch { return 'LOCAL'; }
}

// ── Render ────────────────────────────────────────────────────────────────
function render(picked) {
  const banner = document.getElementById('banner');

  if (!picked) {
    banner.innerHTML = `<div class="inner"><div class="loading">No fixtures available right now</div></div>`;
    return;
  }

  const { ev, state } = picked;
  const comp  = ev.competitions?.[0];
  const home  = comp?.competitors?.find(c => c.homeAway === 'home');
  const away  = comp?.competitors?.find(c => c.homeAway === 'away');
  if (!home || !away) return;

  const homeAbbr = home.team?.abbreviation || '???';
  const awayAbbr = away.team?.abbreviation || '???';
  const homeName = home.team?.displayName || homeAbbr;
  const awayName = away.team?.displayName || awayAbbr;
  const homeScore = home.score !== undefined && home.score !== '' ? parseInt(home.score) : null;
  const awayScore = away.score !== undefined && away.score !== '' ? parseInt(away.score) : null;
  const hasScore  = homeScore !== null && awayScore !== null;

  const goals  = extractGoals(comp);
  const homeGoals = goals.filter(g => g.teamId === home.team?.id);
  const awayGoals = goals.filter(g => g.teamId === away.team?.id);

  const kickoff = new Date(ev.date);
  const venue   = comp?.venue?.fullName || '';
  const city    = [comp?.venue?.address?.city, comp?.venue?.address?.state].filter(Boolean).join(', ');
  const venueStr = [venue, city].filter(Boolean).join(' · ');
  const note    = comp?.notes?.find(n => n.type === 'event')?.headline || '';
  const clock   = ev.status?.displayClock || '';

  const homeWinner = home.winner === true && state === 'ft';
  const awayWinner = away.winner === true && state === 'ft';

  isLiveNow = state === 'live' || state === 'ht';

  // ── Status pill ──
  let pillHTML = '';
  if (state === 'live') {
    pillHTML = `<div class="status-pill live"><span class="live-dot"></span>LIVE ${clock}</div>`;
  } else if (state === 'ht') {
    pillHTML = `<div class="status-pill ht">⏸ HALF TIME</div>`;
  } else if (state === 'ft') {
    pillHTML = `<div class="status-pill ft">✓ FULL TIME</div>`;
  } else {
    pillHTML = `<div class="status-pill upcoming">⚽ UPCOMING</div>`;
  }

  // ── Center block ──
  let centerHTML = '';
  if (state === 'upcoming') {
    const timeStr = kickoff.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const dateStr = kickoff.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    centerHTML = `
      <div class="kick-time">${timeStr}</div>
      <div class="kick-date">${dateStr} · ${tzLabel()}</div>
    `;
  } else if (hasScore) {
    centerHTML = `<div class="score ${state === 'live' ? 'live-score' : ''}">${homeScore} – ${awayScore}</div>`;
  } else {
    centerHTML = `<div class="vs-text">VS</div>`;
  }

  // ── Countdown (only for upcoming) ──
  let countdownHTML = '';
  if (state === 'upcoming') {
    countdownHTML = `
      <div class="countdown">
        <div class="cd-unit" id="cd-days-wrap">
          <div class="cd-value" id="cd-d">00</div>
          <div class="cd-label">Days</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-value" id="cd-h">00</div>
          <div class="cd-label">Hrs</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-value" id="cd-m">00</div>
          <div class="cd-label">Min</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-value" id="cd-s">00</div>
          <div class="cd-label">Sec</div>
        </div>
      </div>
    `;
  }

  // ── Goals strip ──
  let goalsHTML = '';
  if (goals.length > 0) {
    const hg = homeGoals.slice(0, 3).map(g => {
      const label = g.ownGoal ? `${g.name} (OG)` : g.penalty ? `${g.name} (P)` : g.name;
      return `<div class="goal-item home"><span class="goal-name">${esc(label)}</span><span class="goal-min">${esc(g.minute)}</span></div>`;
    }).join('');
    const ag = awayGoals.slice(0, 3).map(g => {
      const label = g.ownGoal ? `${g.name} (OG)` : g.penalty ? `${g.name} (P)` : g.name;
      return `<div class="goal-item away"><span class="goal-min">${esc(g.minute)}</span> <span class="goal-name">${esc(label)}</span></div>`;
    }).join('');
    goalsHTML = `<div class="goals-strip">${hg}${ag}</div>`;
  }

  // ── Round badge ──
  const roundBadge = note
    ? `<div class="round-badge">${esc(note)}</div>`
    : '';

  banner.innerHTML = `
    <div class="inner">
      <div class="top-strip">
        <div class="tournament-label">
          <div class="wc-badge">⚽</div>
          <div>
            <div class="tournament-name">FIFA World Cup 2026</div>
            <div class="tournament-sub">USA · Canada · Mexico</div>
          </div>
        </div>
        <div class="local-time">
          <div class="local-time-value" id="local-time-val">--:--:--</div>
          <div class="local-time-label">${tzLabel()}</div>
        </div>
      </div>

      <div class="status-row">${pillHTML}</div>

      <div class="match-row">
        <div class="team ${homeWinner ? 'winner' : ''}">
          <div class="team-flag">${getFlag(homeAbbr)}</div>
          <div class="team-code">${esc(homeAbbr)}</div>
          <div class="team-name">${esc(homeName)}</div>
        </div>

        <div class="center">${centerHTML}</div>

        <div class="team ${awayWinner ? 'winner' : ''}">
          <div class="team-flag">${getFlag(awayAbbr)}</div>
          <div class="team-code">${esc(awayAbbr)}</div>
          <div class="team-name">${esc(awayName)}</div>
        </div>
      </div>

      ${countdownHTML}
      ${goalsHTML}

      <div class="bottom-strip">
        <div class="venue-info">
          ${venueStr ? `<span class="venue-icon">📍</span>${esc(venueStr)}` : ''}
        </div>
        ${roundBadge}
      </div>
    </div>
  `;

  startClock();
  if (state === 'upcoming') startCountdown(kickoff);
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Main fetch + render loop ──────────────────────────────────────────────
async function fetchAndRender() {
  try {
    // Fetch 3-day window for best coverage
    const now   = new Date();
    const dates = [-1, 0, 1].map(offset => {
      const d = new Date(now);
      d.setDate(d.getDate() + offset);
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    });

    const results = await Promise.allSettled(
      dates.map(date =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}&limit=20`)
          .then(r => r.ok ? r.json() : { events: [] })
      )
    );

    const allEvents = [];
    const seen = new Set();
    for (const r of results) {
      if (r.status === 'fulfilled') {
        for (const ev of (r.value.events || [])) {
          if (!seen.has(ev.id)) { seen.add(ev.id); allEvents.push(ev); }
        }
      }
    }

    const picked = pickMatch(allEvents);
    render(picked);

  } catch (err) {
    document.getElementById('banner').innerHTML =
      `<div class="inner"><div class="loading">⚠️ Could not load match data</div></div>`;
    console.error(err);
  }

  // Schedule next refresh
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAndRender, isLiveNow ? 30000 : 60000);
}

fetchAndRender();
</script>
